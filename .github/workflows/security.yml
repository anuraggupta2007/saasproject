# =============================================================================
# Security Scanning Pipeline
# =============================================================================
# Comprehensive security scanning: SAST, dependency audit, secret scanning
# Runs weekly and on-demand
# =============================================================================

name: Security Scan

on:
  schedule:
    - cron: "0 6 * * 1"  # Weekly on Monday at 6 AM UTC
  workflow_dispatch:
  push:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ===========================================================================
  # Dependency Vulnerability Scan
  # ===========================================================================
  dependencies:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit safety

      - name: Run pip-audit
        run: pip-audit -r requirements.txt --desc on --output pip-audit-results.json --format json
        continue-on-error: true

      - name: Run safety check
        run: safety check -r requirements.txt --output json > safety-results.json || true
        continue-on-error: true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit
          path: |
            pip-audit-results.json
            safety-results.json

  # ===========================================================================
  # Secret Scanning
  # ===========================================================================
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ===========================================================================
  # SAST (Static Application Security Testing)
  # ===========================================================================
  sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: bandit -r src/ -f json -o bandit-results.json --severity-level medium || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: sast-results
          path: bandit-results.json

  # ===========================================================================
  # Container Image Scanning
  # ===========================================================================
  container-scan:
    name: Container Scan
    runs-on: ubuntu-latest
    needs: [dependencies]
    strategy:
      matrix:
        service:
          - api
          - celery-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          format: sarif
          output-file: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH,MEDIUM
        continue-on-error: true

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

  # ===========================================================================
  # Infrastructure as Code Scan
  # ===========================================================================
  iac-scan:
    name: IaC Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: k8s/
          framework: kubernetes
          output_format: cli,sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      - name: Upload results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov-kubernetes

  # ===========================================================================
  # Security Summary
  # ===========================================================================
  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependencies, secrets, sast, container-scan, iac-scan]
    if: always()
    steps:
      - name: Create summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependencies | ${{ needs.dependencies.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets | ${{ needs.secrets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST | ${{ needs.sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container | ${{ needs.container-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| IaC | ${{ needs.iac-scan.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Notify on critical findings
        if: needs.secrets.result == 'failure'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 SECURITY: Secrets detected in repository",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚨 *SECURITY ALERT: Secrets Detected*\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Link:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Results>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
