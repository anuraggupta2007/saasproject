apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "email-converter.fullname" . }}-postgres-init
  namespace: {{ include "email-converter.namespace" . }}
  labels:
    {{- include "email-converter.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
data:
  init.sh: |
    #!/bin/bash
    set -e
    echo "Running PostgreSQL initialization..."
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
        CREATE EXTENSION IF NOT EXISTS "pgcrypto";
        CREATE EXTENSION IF NOT EXISTS "pg_trgm";
        ALTER DATABASE email_converter SET timezone TO 'UTC';
        RAISE NOTICE 'Database initialization completed';
    EOSQL
    echo "PostgreSQL initialization complete"
