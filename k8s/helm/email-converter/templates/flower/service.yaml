apiVersion: v1
kind: Service
metadata:
  name: flower
  namespace: {{ include "email-converter.namespace" . }}
  labels:
    {{- include "email-converter.labels" . | nindent 4 }}
    app.kubernetes.io/component: flower
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.flower.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "email-converter.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: flower
