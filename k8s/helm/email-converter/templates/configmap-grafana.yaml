apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "email-converter.fullname" . }}-grafana-datasources
  namespace: {{ include "email-converter.namespace" . }}
  labels:
    {{- include "email-converter.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.{{ .Release.Namespace }}.svc.cluster.local:9090
        isDefault: true
        editable: true
        jsonData:
          timeInterval: "15s"
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.{{ .Release.Namespace }}.svc.cluster.local:3100
        editable: true
        jsonData:
          maxLines: 1000

  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: "Email Converter Dashboards"
        orgId: 1
        folder: "Email Converter"
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
