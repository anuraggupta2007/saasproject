apiVersion: v1
kind: Secret
metadata:
  name: {{ include "email-converter.fullname" . }}-secrets
  namespace: {{ include "email-converter.namespace" . }}
  labels:
    {{- include "email-converter.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # Application
  SECRET_KEY: {{ .Values.secrets.secretKey | b64enc | quote }}

  # Database
  DATABASE_URL: {{ include "email-converter.databaseUrl" . | b64enc | quote }}
  POSTGRES_USER: {{ .Values.postgresql.auth.username | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | b64enc | quote }}
  POSTGRES_DB: {{ .Values.postgresql.auth.database | b64enc | quote }}

  # Redis
  REDIS_URL: {{ include "email-converter.redisUrl" . | b64enc | quote }}
  REDIS_PASSWORD: {{ .Values.redis.auth.password | b64enc | quote }}

  # Celery
  CELERY_BROKER_URL: {{ include "email-converter.celeryBrokerUrl" . | b64enc | quote }}
  CELERY_RESULT_BACKEND: {{ include "email-converter.celeryResultBackend" . | b64enc | quote }}

  # MinIO / Storage
  STORAGE_PROVIDER: {{ "minio" | b64enc | quote }}
  STORAGE_ENDPOINT: {{ include "email-converter.minioEndpoint" . | b64enc | quote }}
  STORAGE_BUCKET: {{ "email-converter-uploads" | b64enc | quote }}
  STORAGE_ACCESS_KEY: {{ .Values.secrets.storageAccessKey | default .Values.minio.auth.rootUser | b64enc | quote }}
  STORAGE_SECRET_KEY: {{ .Values.secrets.storageSecretKey | default .Values.minio.auth.rootPassword | b64enc | quote }}
  MINIO_ROOT_USER: {{ .Values.minio.auth.rootUser | b64enc | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.minio.auth.rootPassword | b64enc | quote }}

  # License
  LICENSE_ENCRYPTION_KEY: {{ .Values.secrets.licenseEncryptionKey | b64enc | quote }}

  # SMTP
  SMTP_HOST: {{ .Values.secrets.smtpHost | b64enc | quote }}
  SMTP_USER: {{ .Values.secrets.smtpUser | b64enc | quote }}
  SMTP_PASSWORD: {{ .Values.secrets.smtpPassword | b64enc | quote }}
  SMTP_FROM: {{ .Values.secrets.smtpFrom | b64enc | quote }}

  # OAuth
  GOOGLE_CLIENT_ID: {{ .Values.secrets.googleClientId | b64enc | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | b64enc | quote }}
  MICROSOFT_CLIENT_ID: {{ .Values.secrets.microsoftClientId | b64enc | quote }}
  MICROSOFT_CLIENT_SECRET: {{ .Values.secrets.microsoftClientSecret | b64enc | quote }}

  # Payment
  STRIPE_SECRET_KEY: {{ .Values.secrets.stripeSecretKey | b64enc | quote }}
  STRIPE_PUBLISHABLE_KEY: {{ .Values.secrets.stripePublishableKey | b64enc | quote }}
  STRIPE_WEBHOOK_SECRET: {{ .Values.secrets.stripeWebhookSecret | b64enc | quote }}
  RAZORPAY_KEY_ID: {{ .Values.secrets.razorpayKeyId | b64enc | quote }}
  RAZORPAY_KEY_SECRET: {{ .Values.secrets.razorpayKeySecret | b64enc | quote }}
  RAZORPAY_WEBHOOK_SECRET: {{ .Values.secrets.razorpayWebhookSecret | b64enc | quote }}

  # Notifications
  SENDGRID_API_KEY: {{ .Values.secrets.sendgridApiKey | b64enc | quote }}
  SENDGRID_FROM_EMAIL: {{ .Values.secrets.sendgridFromEmail | b64enc | quote }}
  TWILIO_ACCOUNT_SID: {{ .Values.secrets.twilioAccountSid | b64enc | quote }}
  TWILIO_AUTH_TOKEN: {{ .Values.secrets.twilioAuthToken | b64enc | quote }}
  TWILIO_PHONE_NUMBER: {{ .Values.secrets.twilioPhoneNumber | b64enc | quote }}

  # Monitoring
  SENTRY_DSN: {{ .Values.secrets.sentryDsn | b64enc | quote }}
  SENTRY_ENVIRONMENT: {{ .Values.global.environment | b64enc | quote }}

  # Grafana
  GF_SECURITY_ADMIN_PASSWORD: {{ .Values.secrets.grafanaAdminPassword | b64enc | quote }}
