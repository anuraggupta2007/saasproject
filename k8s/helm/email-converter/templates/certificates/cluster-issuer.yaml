{{- if .Values.certificates.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ include "email-converter.fullname" . }}-letsencrypt-prod
  labels:
    {{- include "email-converter.labels" . | nindent 4 }}
    app.kubernetes.io/component: certificate
spec:
  acme:
    server: {{ .Values.certificates.issuer.server }}
    email: {{ .Values.certificates.issuer.email }}
    privateKeySecretRef:
      name: {{ include "email-converter.fullname" . }}-letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "email-converter.fullname" . }}-cert
  namespace: {{ include "email-converter.namespace" . }}
  labels:
    {{- include "email-converter.labels" . | nindent 4 }}
    app.kubernetes.io/component: certificate
spec:
  secretName: {{ .Values.certificates.secretName }}
  issuerRef:
    name: {{ include "email-converter.fullname" . }}-letsencrypt-prod
    kind: ClusterIssuer
  commonName: api.emailconverter.com
  dnsNames:
    - api.emailconverter.com
    - emailconverter.com
    - "*.emailconverter.com"
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: ECDSA
    size: 256
{{- end }}
