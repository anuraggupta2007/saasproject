apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: email-converter-staging
namePrefix: staging-

resources:
  - ../../base

patches:
  - target:
      kind: Namespace
      name: email-converter
    patch: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: email-converter
        labels:
          environment: staging

  - target:
      kind: Deployment
      name:.*-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi

  - target:
      kind: Deployment
      name:.*-celery-worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
