apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: email-converter-prod
namePrefix: prod-

resources:
  - ../../base

patches:
  - target:
      kind: Namespace
      name: email-converter
    patch: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: email-converter
        labels:
          environment: production
        annotations:
          scheduler.alpha.kubernetes.io/defaultTolerations: '[{"key":"CriticalAddonsOnly","operator":"Exists","effect":"NoSchedule"}]'

  - target:
      kind: Deployment
      name:.*-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3

  - target:
      kind: Deployment
      name:.*-celery-worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
