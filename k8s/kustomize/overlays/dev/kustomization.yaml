apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: email-converter-dev
namePrefix: dev-

resources:
  - ../../base

patches:
  - target:
      kind: Namespace
      name: email-converter
    patch: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: email-converter
        labels:
          environment: development

  - target:
      kind: Deployment
      name:.*-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi

  - target:
      kind: Deployment
      name:.*-celery-worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  - target:
      kind: Deployment
      name:.*-grafana
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/2/value
        value: "admin"

  - target:
      kind: PersistentVolumeClaim
    patch: |
      - op: replace
        path: /spec/resources/requests/storage
        value: 10Gi
