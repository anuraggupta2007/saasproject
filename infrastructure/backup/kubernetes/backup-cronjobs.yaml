apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-pvc
  namespace: email-converter
  labels:
    app.kubernetes.io/name: backup-storage
    app.kubernetes.io/part-of: email-converter-backup
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-sa
  namespace: email-converter
  labels:
    app.kubernetes.io/name: backup-sa
    app.kubernetes.io/part-of: email-converter-backup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backup-role
  namespace: email-converter
  labels:
    app.kubernetes.io/name: backup-role
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backup-rolebinding
  namespace: email-converter
  labels:
    app.kubernetes.io/name: backup-rolebinding
subjects:
  - kind: ServiceAccount
    name: backup-sa
    namespace: email-converter
roleRef:
  kind: Role
  name: backup-role
  apiGroup: rbac.authorization.k8s.io
