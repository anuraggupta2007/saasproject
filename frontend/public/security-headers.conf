# Security Headers for Nginx / Production
# Add these to your Nginx config or hosting provider headers

# Content Security Policy
Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' http://localhost:8000 ws://localhost:8000 https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'

# Prevent MIME type sniffing
X-Content-Type-Options: nosniff

# XSS Protection (legacy browsers)
X-XSS-Protection: 1; mode=block

# Clickjacking Protection
X-Frame-Options: DENY

# Referrer Policy
Referrer-Policy: strict-origin-when-cross-origin

# Permissions Policy
Permissions-Policy: camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()

# Strict Transport Security (HTTPS only)
Strict-Transport-Security: max-age=31536000; includeSubDomains; preload

# Cross-Origin Policies
Cross-Origin-Embedder-Policy: require-corp
Cross-Origin-Opener-Policy: same-origin
Cross-Origin-Resource-Policy: same-origin
